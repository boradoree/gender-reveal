<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>동그라미 Gender Reveal</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      /* 🔮 기본: 연보라 (중립) */
      background: radial-gradient(circle at top, #ffffff, #f2efff);
      color:#111;
      transition: background 0.8s ease;
    }

    /* 💖 공개 순간: 핑크 모드 */
    body.pink-mode{
      background: radial-gradient(circle at top, #fff0f6, #ffd6e8);
    }

    .card{
      width:min(520px, 92vw);
      background:#fff;
      border-radius:22px;
      padding:32px 22px 36px;
      box-shadow: 0 14px 34px rgba(0,0,0,.1);
      text-align:center;
      position:relative;
      overflow:hidden;
      transition: box-shadow 0.6s ease, transform 0.2s ease;
    }

    body.pink-mode .card{
      box-shadow: 0 18px 40px rgba(255,90,165,.25);
    }

    h1{
      margin:0;
      font-size:32px;
      color:#7a6cff;
      font-weight:900;
      transition: color 0.6s ease;
    }

    body.pink-mode h1{
      color:#ff3b7d;
    }

    .due{
      margin-top:6px;
      font-size:15px;
      color:#777;
    }

    .subtitle{
      margin-top:14px;
      font-size:16px;
      color:#444;
    }

    .btn{
      margin-top:26px;
      font-size:18px;
      padding:14px 24px;
      border-radius:16px;
      border:0;
      cursor:pointer;
      background:#8b7cff;
      color:#fff;
      font-weight:600;
      transition: background 0.6s ease;
    }

    body.pink-mode .btn{
      background:#ff5aa5;
    }

    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .count{
      font-size:58px;
      font-weight:900;
      margin-top:18px;
      display:none;
      color:#7a6cff;
      transition: color 0.6s ease;
    }

    body.pink-mode .count{
      color:#ff3b7d;
    }

    .result{
      margin-top:20px;
      font-size:48px;
      font-weight:900;
      display:none;
      color:#ff3b7d;
    }

    /* confetti (핑크) */
    .confetti{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .piece{
      position:absolute;
      top:-12px;
      width:10px;
      height:18px;
      opacity:.9;
      animation: fall linear forwards;
    }

    @keyframes fall{
      to{
        transform: translateY(110vh) rotate(540deg);
        opacity:1;
      }
    }

    /* 💖 하트 퍼짐(파티클) */
    .hearts{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    .heart{
      position:absolute;
      left:50%;
      top:60%;
      transform: translate(-50%, -50%) scale(1);
      font-size: 22px;
      opacity: 0;
      animation: pop 1200ms ease-out forwards;
      filter: drop-shadow(0 6px 10px rgba(255,90,165,.25));
      will-change: transform, opacity;
    }
    @keyframes pop{
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.2); }
      10%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(var(--s)); }
    }

    /* 공개 순간 카드 살짝 “둥!” */
    @keyframes punch {
      0% { transform: scale(1); }
      40% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
    .punch {
      animation: punch 420ms ease-out;
    }
  </style>
</head>
<body>

  <div class="card" id="card">
    <div class="confetti" id="confetti"></div>
    <div class="hearts" id="hearts"></div>

    <h1>👶 동그라미</h1>
    <div class="due">출산 예정일 · 2026. 7. 7</div>

    <div class="subtitle" id="subtitle">
      버튼을 누르면 공개돼요 💫
    </div>

    <button class="btn" id="btn" onclick="startReveal()">
      확인하기 ✨
    </button>

    <div class="count" id="count">3</div>
    <div class="result" id="result">🎀 GIRL 🎀</div>
  </div>

  <script>
    const btn = document.getElementById('btn');
    const countEl = document.getElementById('count');
    const resultEl = document.getElementById('result');
    const subtitleEl = document.getElementById('subtitle');
    const cardEl = document.getElementById('card');

    function startReveal(){
      btn.disabled = true;
      subtitleEl.textContent = "두근두근… 💜";
      countEl.style.display = "block";
      resultEl.style.display = "none";

      let n = 3;
      countEl.textContent = n;

      const timer = setInterval(() => {
        n -= 1;
        if (n === 0){
          clearInterval(timer);
          countEl.style.display = "none";
          reveal();
        } else {
          countEl.textContent = n;
        }
      }, 700);
    }

    function reveal(){
      /* 💖 공개 순간 → 핑크 모드 ON */
      document.body.classList.add("pink-mode");

      /* 📳 공개 순간 진동 (모바일 지원 시 / iOS는 대부분 미지원) */
      if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200, 100, 300]);
      }

      /* 카드 둥! */
      cardEl.classList.remove("punch");
      // reflow to restart animation
      void cardEl.offsetWidth;
      cardEl.classList.add("punch");

      subtitleEl.textContent = "짜잔! 동그라미는… 💕";
      resultEl.style.display = "block";

      launchConfetti();
      launchHearts();
    }

    function launchConfetti(){
      const wrap = document.getElementById('confetti');
      wrap.innerHTML = "";

      /* 💖 핑크 컨페티 */
      const colors = ["#ff5aa5", "#ff8ac8", "#ffd1e6", "#ff3b7d"];
      const pieces = 160;

      for (let i = 0; i < pieces; i++){
        const d = document.createElement('div');
        d.className = "piece";
        d.style.left = Math.random() * 100 + "%";
        d.style.background = colors[Math.floor(Math.random() * colors.length)];
        d.style.width = (6 + Math.random() * 8) + "px";
        d.style.height = (10 + Math.random() * 14) + "px";
        d.style.animationDuration = (900 + Math.random() * 900) + "ms";
        d.style.animationDelay = (Math.random() * 150) + "ms";
        wrap.appendChild(d);
      }

      setTimeout(() => wrap.innerHTML = "", 3200);
    }

    /* 💖 하트 퍼짐: 중앙에서 위/좌/우로 흩어지는 파티클 */
    function launchHearts(){
      const wrap = document.getElementById('hearts');
      wrap.innerHTML = "";

      const hearts = ["💖","💗","💞","💕","💘","💓"];
      const count = 26;

      for (let i = 0; i < count; i++){
        const h = document.createElement('div');
        h.className = "heart";
        h.textContent = hearts[Math.floor(Math.random() * hearts.length)];

        // 카드 중앙 근처에서 시작, 흩어지는 방향 랜덤
        const tx = (Math.random() * 320 - 160);   // -160 ~ 160px
        const ty = (Math.random() * -360 - 80);   // -80 ~ -440px (위로)
        const s  = (0.7 + Math.random() * 1.2);   // 0.7 ~ 1.9
        const delay = Math.random() * 180;        // 0~180ms

        h.style.setProperty("--tx", `calc(-50% + ${tx}px)`);
        h.style.setProperty("--ty", `calc(-50% + ${ty}px)`);
        h.style.setProperty("--s", s.toFixed(2));
        h.style.animationDelay = `${delay}ms`;
        h.style.fontSize = `${18 + Math.random() * 18}px`; // 18~36px

        // 위치를 살짝 분산(너무 한 점에서만 나오지 않게)
        h.style.left = `${50 + (Math.random() * 14 - 7)}%`;
        h.style.top  = `${60 + (Math.random() * 10 - 5)}%`;

        wrap.appendChild(h);
      }

      setTimeout(() => wrap.innerHTML = "", 1600);
    }
  </script>

</body>
</html>
